services:
  postgres:
    image: postgres:latest
    container_name: apontamento
    environment:
      POSTGRES_USER: ${USUARIO}
      POSTGRES_PASSWORD: ${SENHA}  
      POSTGRES_DB: ${NAME}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USUARIO} -d apontamento"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
